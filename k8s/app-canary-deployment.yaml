apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-canary
  labels:
    app: crdt-app
    version: canary
spec:
  replicas: 1
  selector:
    matchLabels:
      app: crdt-app
      version: canary
  template:
    metadata:
      labels:
        app: crdt-app
        version: canary
    spec:
      containers:
        - name: app
          image: crdt-app:canary
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: AUTH_MODE
              value: "disabled"
            - name: USE_REDIS
              value: "false"
            - name: ANALYTICS_SERVICE_URL
              value: "http://analytics-service:3001"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 15
