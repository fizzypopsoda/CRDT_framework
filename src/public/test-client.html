<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pixel Canvas</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --bg: #f5e6ff;
            --bg-dark: #d4a5e8;
            --bg-light: #fff0ff;
            --panel: #ffe6f5;
            --ink: #6b4c7a;
            --accent: #b19cd9;
            --border: #c895d9;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 24px;
            font-family: "Press Start 2P", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            font-size: 10px;
            color: var(--ink);
            background: var(--bg);
            background-image:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(177,156,217,.1) 2px, rgba(177,156,217,.1) 4px),
                repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(177,156,217,.1) 2px, rgba(177,156,217,.1) 4px);
        }
        .app {
            max-width: 1080px; margin: 0 auto;
        }
        .toolbar {
            display: flex; gap: 12px; align-items: center;
            background: var(--panel); padding: 12px 14px;
            border: 3px outset var(--bg-light);
            border-radius: 8px; box-shadow: 0 4px 0 var(--border);
        }
        .toolbar .swatch {
            width: 24px; height: 24px;
            border-radius: 4px;
            border: 3px inset var(--bg-dark);
        }
        .toolbar label {
            font-size: 9px;
            opacity: .8;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .toolbar input[type="range"] { width: 180px; }
        .board-wrap {
            position: relative; margin-top: 16px;
            width: fit-content;
            border-radius: 12px; overflow: hidden;
            border: 4px outset var(--bg-light);
            box-shadow: 0 6px 0 var(--border);
            background: white;
        }
        canvas#canvas, canvas#overlay {
            display: block;
            image-rendering: pixelated;
            cursor: crosshair;
        }
        canvas#overlay {
            position: absolute; inset: 0; pointer-events: none;
        }
        .hint {
            margin-top: 8px; font-size: 12px; opacity: .6;
        }
        .spacer { flex: 1; }

        /* Pixel-style toggle UI */
        #modeToggle.mode-toggle {
            font-family: "Press Start 2P", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
            font-size: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 6px 10px;
            margin-left: 4px;
            color: var(--ink);
            background: var(--bg-light);
            border: 3px outset var(--bg-light);
            border-radius: 4px;
            cursor: pointer;
        }

        #modeToggle.mode-toggle-batched {
            background: #d1fae5; /* light green-ish when batched */
        }

        #modeToggle.mode-toggle-perpixel {
            background: #fee2e2; /* light red-ish when per-pixel */
        }

        #modeToggle.mode-toggle:hover {
            background: var(--panel);
        }

        #modeToggle.mode-toggle:active {
            border-style: inset;
            transform: translateY(1px);
        }

        .mini-btn {
            font-family: "Press Start 2P", system-ui, sans-serif;
            font-size: 7px;
            padding: 5px 8px;
            color: var(--ink);
            background: var(--bg-light);
            border: 2px outset var(--bg-light);
            border-radius: 4px;
            cursor: pointer;
        }
        .mini-btn:active { border-style: inset; }

        #minimap {
            position: absolute;
            right: 8px;
            bottom: 8px;
            width: 120px;
            height: 120px;
            image-rendering: pixelated;
            border: 2px solid var(--border);
            border-radius: 6px;
            background: rgba(0,0,0,0.15);
            pointer-events: none;
            z-index: 2;
            box-shadow: 0 2px 8px rgba(0,0,0,.2);
        }

        .leaderboard-strip {
            margin-top: 10px;
            padding: 10px 12px;
            font-size: 8px;
            line-height: 1.5;
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 8px;
            color: var(--ink);
            word-break: break-word;
        }
        .leaderboard-strip h2 {
            margin: 0 0 8px 0;
            font-size: 9px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            opacity: 0.85;
        }
        .lb-empty { margin: 0; opacity: 0.75; }
        .lb-list {
            list-style: none;
            margin: 0;
            padding: 0;
            display: grid;
            gap: 4px;
        }
        .lb-list li {
            display: grid;
            grid-template-columns: 22px 1fr auto;
            align-items: center;
            gap: 8px;
            padding: 4px 6px;
            background: rgba(255,255,255,0.45);
            border-radius: 4px;
            border: 1px solid rgba(200,149,217,0.5);
        }
        .lb-place { opacity: 0.65; text-align: right; }
        .lb-college { font-weight: bold; }
        .lb-count { opacity: 0.9; font-variant-numeric: tabular-nums; }
        .lb-total { margin-top: 8px; padding-top: 6px; border-top: 1px dashed var(--border); opacity: 0.8; }

        #profile {
            font-size: 8px;
            max-width: 220px;
            line-height: 1.4;
            opacity: 0.95;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="toolbar">
        <a href="/logout" style="position:fixed;top:12px;right:12px;">Log out</a>
        <a href="/login" style="position:fixed;top:12px;right:88px;font-size:8px;">CAS login</a>
        <label>Color</label>
        <label for="colorPicker"></label><input type="color" id="colorPicker" />
        <div class="swatch" id="colorSwatch"></div>

        <div style="width:1px;height:20px;background:#e6e6ee;margin:0 8px;"></div>
        <span id="sizeLabel"></span>

        <div style="width:1px;height:20px;background:#e6e6ee;margin:0 8px;"></div>
        <button id="modeToggle" class="mode-toggle mode-toggle-batched">MODE: BATCHED</button>

        <div style="width:1px;height:20px;background:#e6e6ee;margin:0 8px;"></div>
        <button type="button" id="bordersToggle" class="mini-btn" title="4×4 regions (25×25 px each); labels use college codes">College borders: OFF</button>
        <button type="button" id="undoBtn" class="mini-btn" title="Ctrl/Cmd+Z">Undo</button>
        <button type="button" id="redoBtn" class="mini-btn" title="Ctrl/Cmd+Shift+Z">Redo</button>

        <div class="spacer"></div>
        <span id="profile"></span>
    </div>

    <div class="leaderboard-strip" title="Pixels counted by the painter's college (updates over WebSocket)">
        <h2>Territory leaderboard</h2>
        <div id="leaderboard"></div>
    </div>

    <div class="board-wrap">
        <canvas id="canvas"></canvas>
        <canvas id="overlay"></canvas>
        <canvas id="minimap" width="120" height="120" aria-hidden="true"></canvas>
    </div>

</div>

<script type="module" src="./client.js"></script>
</body>
</html>
